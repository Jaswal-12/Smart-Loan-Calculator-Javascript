<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Adder</title>
  <link rel="stylesheet" href="index.css">
</head>
<body>

  <div class="container">
    <h1>Number Adder</h1>
    <p>Enter two numbers below and click the button to add them</p>

    <input type="number" id="i1" placeholder="First number">
    <input type="number" id="i2" placeholder="Second number">

    <button id="add">Add Numbers</button>

    <h2 id="result">Result</h2>
  </div>

  <script src="script.js"></script>
</body>
</html>
